name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: audit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/audit_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Run tests (exclude integration/e2e)
        run: |
          python -m pytest backend/tests/ \
            --ignore=backend/tests/integration \
            --ignore=backend/tests/e2e \
            -x --tb=short

  backend-tests-pg:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_audit
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
        working-directory: .
      - name: Run PG-only tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_audit
        run: python -m pytest tests/ -m pg_only -v --tb=short
        working-directory: backend

  ledger-import-smoke:
    # S6-18: v2 账表导入引擎端到端 smoke
    # 防止"单测通过但真实数据跑不通"的回归（Sprint 6 复盘教训）
    # 不依赖 PG，SQLite 内存库 + 最小合成样本（S7-3 fixture 必跑）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true  # 若真实样本用 LFS 存储
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Run ledger_import full suite (含最小合成样本 smoke)
        run: |
          python -m pytest backend/tests/ledger_import/ \
            --ignore=backend/tests/ledger_import/test_execute_v2_e2e.py \
            --ignore=backend/tests/ledger_import/test_real_samples_smoke.py \
            --ignore=backend/tests/ledger_import/test_9_samples_e2e.py \
            --tb=short -v
      - name: Run real-sample tests (skip if 数据/ absent)
        run: |
          python -m pytest \
            backend/tests/ledger_import/test_real_samples_smoke.py \
            backend/tests/ledger_import/test_execute_v2_e2e.py \
            backend/tests/ledger_import/test_9_samples_e2e.py \
            -v --tb=short -s || true  # 允许 skip 不挂 CI

  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Ruff check
        run: python -m ruff check backend/
      - name: Check signature_level usage
        run: python scripts/check_signature_level_usage.py
      - name: B' view refactor guard (Tb*.is_deleted ORM usage)
        run: |
          # B' 视图重构后，业务查询必须走 get_active_filter，不能直接写
          # TbX.is_deleted == False (禁止 ORM 层硬编码 is_deleted 过滤)
          # 允许清单：get_active_filter 内部实现、年度 fallback 兜底分支
          # 基线：2026-05-10 Sprint 1 完成，剩余 6 处是 year=None Template B 兜底
          BASELINE=6
          COUNT=$(grep -rEn "Tb(Balance|Ledger|AuxBalance|AuxLedger)\.is_deleted\s*==" backend/app/ \
            --include="*.py" | wc -l)
          echo "Direct TbX.is_deleted== ORM usage: $COUNT (baseline: $BASELINE)"
          if [ "$COUNT" -gt "$BASELINE" ]; then
            echo "::error::TbX.is_deleted ORM usage increased from $BASELINE to $COUNT."
            echo "::error::Use app.services.dataset_query.get_active_filter instead."
            grep -rEn "Tb(Balance|Ledger|AuxBalance|AuxLedger)\.is_deleted\s*==" backend/app/ --include="*.py"
            exit 1
          fi
      - name: F40 upload_security guard (detect entry must call validate_upload_safety)
        run: |
          # F40：所有对外接收上传文件的入口必须调用 validate_upload_safety
          # 防止有人绕过上传校验直接 create artifact / write
          # 当前必须命中的入口：
          #   - backend/app/routers/ledger_import_v2.py (POST /detect)
          #   - backend/app/services/ledger_import_application_service.py (resolve_file_sources)
          set -e
          for FILE in backend/app/routers/ledger_import_v2.py backend/app/services/ledger_import_application_service.py; do
            HITS=$(grep -c "validate_upload_safety" "$FILE" || true)
            if [ "$HITS" -lt 1 ]; then
              echo "::error file=$FILE::validate_upload_safety missing (F40 upload security guard)"
              exit 1
            fi
            echo "  $FILE: validate_upload_safety hits = $HITS"
          done
      - name: F48 validation rules catalog consistency
        run: |
          # F48：VALIDATION_RULES_CATALOG 必须与 errors.py 的 ErrorCode 双向一致
          # 专用测试在 backend/tests/ledger_import/test_validation_rules_catalog.py
          # 已在 ledger-import-smoke job 中跑；这里再独立跑一次作为卡点
          python -m pytest backend/tests/ledger_import/test_validation_rules_catalog.py -v --tb=short
      - name: F48 error hints coverage (all ErrorCode must have hint)
        run: |
          # F32 / F48 延续：test_all_error_codes_have_hints.py 确保 ErrorCode enum
          # 每个值都在 error_hints.py 有 ErrorHint 注册
          python -m pytest backend/tests/ledger_import/test_error_hints.py -v --tb=short

  seed-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Validate seed files
        run: python scripts/validate_seed_files.py
      - name: Dead link check (apiPaths ↔ router_registry)
        run: node scripts/dead-link-check.js

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: audit-platform/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: audit-platform/frontend
      - name: Type check (vue-tsc)
        run: npx vue-tsc --noEmit
        working-directory: audit-platform/frontend
      - name: Vitest unit tests (V3 Req 14.2 ＋ 防退化卡点)
        # 0 failed 是硬阈值；本轮 V3 把基线从 14/29 降到 0/0，CI 锁住
        run: npx vitest run --reporter=default
        working-directory: audit-platform/frontend
      - name: API hardcode guard (Vue files)
        run: |
          # 统计 Vue 文件中绕过 service 层的硬编码 API 路径数量
          # 基线：115（2026-05-07），只允许减少不允许增加
          BASELINE=115
          COUNT=$(grep -r --include="*.vue" -E "['\`\"/]/api/" src/views src/components \
            | grep -v "apiPaths" | grep -v "^\s*//" | grep -v "^\s*\*" | wc -l)
          echo "Hardcoded API paths in Vue files: $COUNT (baseline: $BASELINE)"
          if [ "$COUNT" -gt "$BASELINE" ]; then
            echo "::error::Hardcoded API paths increased from $BASELINE to $COUNT. Use apiPaths constants instead."
            exit 1
          fi
        working-directory: audit-platform/frontend
      - name: ElMessageBox.confirm guard (R7-S2-06)
        run: |
          # 禁止新代码直接使用 ElMessageBox.confirm，必须走 utils/confirm.ts
          # 允许清单：Adjustments.vue（导航确认）、WorkpaperEditor.vue（版本冲突特殊逻辑）、WorkpaperList.vue（强制通过）、IndependenceDeclarationForm.vue、WorkHoursApproval.vue（即将删除）
          BASELINE=5
          COUNT=$(grep -r --include="*.vue" "ElMessageBox.confirm" src/views \
            | grep -v "// allow-confirm" | wc -l)
          echo "Direct ElMessageBox.confirm usage: $COUNT (baseline: $BASELINE)"
          if [ "$COUNT" -gt "$BASELINE" ]; then
            echo "::error::ElMessageBox.confirm usage increased from $BASELINE to $COUNT. Use utils/confirm.ts instead."
            exit 1
          fi
        working-directory: audit-platform/frontend
      - name: Catch block bare ElMessage.error guard (M1 T2)
        run: |
          # catch 块内禁止裸 ElMessage.error，必须使用 handleApiError
          # baselines.json._v3_coverage_guards.elmessage-error-in-catch 为真源（目标 0，只减不增）
          BASELINE=$(jq -r '._v3_coverage_guards["elmessage-error-in-catch"]' ../../.github/workflows/baselines.json)
          COUNT=$(grep -r --include="*.vue" -c "ElMessage\.error" src/views | awk -F: '{s+=$2}END{print s}')
          echo "Bare ElMessage.error in views: $COUNT (baseline: $BASELINE)"
          if [ "$COUNT" -gt "$BASELINE" ]; then
            echo "::error::Bare ElMessage.error usage increased from $BASELINE to $COUNT. Use handleApiError() instead."
            exit 1
          fi
        working-directory: audit-platform/frontend
      - name: Status hardcoding guard (M1 T4)
        run: |
          # 5 文件状态硬编码只减不增（目标 0）
          # baselines.json._v3_coverage_guards.status-hardcoding-5files 为真源
          BASELINE=$(jq -r '._v3_coverage_guards["status-hardcoding-5files"]' ../../.github/workflows/baselines.json)
          COUNT=0
          # 注意：QcInspectionWorkbench.vue 在 src/views/qc/ 子目录（非扁平 src/views/）
          # 缺失文件视为错误而非静默跳过，避免路径漂移导致卡点失效
          for FILE in src/views/qc/QcInspectionWorkbench.vue src/views/ArchiveWizard.vue src/views/AuditReportEditor.vue src/views/IssueTicketList.vue src/views/PDFExportPanel.vue; do
            if [ -f "$FILE" ]; then
              HITS=$(grep -cE "===\s*['\"]" "$FILE" || true)
              COUNT=$((COUNT + HITS))
            else
              echo "::error::Status hardcoding guard 目标文件缺失：$FILE（路径漂移？请更新 ci.yml）"
              exit 1
            fi
          done
          echo "Status hardcoding in 5 files: $COUNT (baseline: $BASELINE)"
          if [ "$COUNT" -gt "$BASELINE" ]; then
            echo "::error::Status hardcoding increased from $BASELINE to $COUNT. Use statusEnum constants instead."
            exit 1
          fi
        working-directory: audit-platform/frontend
      - name: Inline hex color guard (R7-S3-01)
        run: |
          # 禁止 Vue template 中 style="" 内硬编码十六进制颜色
          # 应使用 var(--gt-*) CSS 变量。基线：触碰即修，只减不增
          BASELINE=80
          COUNT=$(grep -r --include="*.vue" -P 'style="[^"]*#[0-9a-fA-F]{3,8}' src/views \
            | grep -v "// allow-hex" | wc -l)
          echo "Inline hex colors in Vue views: $COUNT (baseline: $BASELINE)"
          if [ "$COUNT" -gt "$BASELINE" ]; then
            echo "::error::Inline hex colors increased from $BASELINE to $COUNT. Use CSS variables instead."
            exit 1
          fi
        working-directory: audit-platform/frontend
      - name: Bare el-tag status guard (R7-S3-01)
        run: |
          # 禁止用 el-tag + 三元表达式表达状态，应使用 GtStatusTag
          # 匹配模式：:type="row.xxx === 'yyy' ?" 或 :type="(xxx) || undefined"
          BASELINE=20
          COUNT=$(grep -r --include="*.vue" -P ':type="\(?.*===.*\?' src/views \
            | grep -v "GtStatusTag" | grep -v "// allow-tag" | wc -l)
          echo "Bare el-tag status patterns: $COUNT (baseline: $BASELINE)"
          if [ "$COUNT" -gt "$BASELINE" ]; then
            echo "::error::Bare el-tag status patterns increased. Use GtStatusTag instead."
            exit 1
          fi
        working-directory: audit-platform/frontend
      - name: V3 GtAmountCell coverage guard (Req 8.1 + M1 T1)
        # M1 T1 治理后（2026-05-30）：GtAmountCell-uses 105（grep 行数口径）/ no-bare-amount-cell 精确违规 88
        # 卡点方向：
        #   ① GtAmountCell-uses 只增不减（grep "GtAmountCell" | wc -l 口径，与 baselines.json 同口径）
        #   ② no-bare-amount-cell（精确 ESLint 规则）只减不增 —— 替代旧的 align-right-cols 粗口径
        #      旧口径含百分比/序号/数量列，零容差易误伤；改用 ESLint AST 精确识别"金额列裸用"
        # baselines.json._v3_coverage_guards 为真源
        run: |
          # ① GtAmountCell-uses（行数口径，与 baselines.json GtAmountCell-uses 字段同口径）
          CELL_COUNT=$(grep -r --include="*.vue" 'GtAmountCell' src | wc -l)
          CELL_BASELINE=$(jq -r '._v3_coverage_guards["GtAmountCell-uses"]' ../../.github/workflows/baselines.json)
          echo "GtAmountCell uses (grep line count): $CELL_COUNT (baseline: $CELL_BASELINE)"
          if [ "$CELL_COUNT" -lt "$CELL_BASELINE" ]; then
            echo "::error::GtAmountCell usage decreased from $CELL_BASELINE to $CELL_COUNT (only increase allowed)"
            exit 1
          fi
          # ② no-bare-amount-cell 精确违规数（ESLint AST，只减不增）
          npx eslint --quiet --format json --rule '{"gt-audit/no-bare-amount-cell": "error"}' src 2>/dev/null > /tmp/bare.json || true
          BARE_COUNT=$(node -e "const d=require('/tmp/bare.json');let c=0;for(const f of d)c+=f.messages.filter(m=>m.ruleId==='gt-audit/no-bare-amount-cell').length;console.log(c)")
          BARE_BASELINE=$(jq -r '._v3_coverage_guards["no-bare-amount-cell-violations"]' ../../.github/workflows/baselines.json)
          echo "no-bare-amount-cell violations (ESLint): $BARE_COUNT (baseline: $BARE_BASELINE)"
          if [ "$BARE_COUNT" -gt "$BARE_BASELINE" ]; then
            echo "::error::Bare amount columns increased from $BARE_BASELINE to $BARE_COUNT. Use <GtAmountCell> instead of raw fmt/toFixed."
            exit 1
          fi
        working-directory: audit-platform/frontend
      - name: V3 form :rules coverage guard (Req 3)
        # V3 Req 3：含提交按钮的 el-form 必须绑定 :rules
        # 实测 baseline（2026-05-28）：108 处 el-form / 70 处含 :rules（65%）
        # 卡点：含 :rules 的视图数只增不减
        run: |
          FORM_COUNT=$(grep -rl --include="*.vue" '<el-form' src | wc -l)
          RULES_COUNT=$(grep -rl --include="*.vue" ':rules=' src | wc -l)
          echo "el-form views: $FORM_COUNT / :rules views: $RULES_COUNT"
          BASELINE=70
          if [ "$RULES_COUNT" -lt "$BASELINE" ]; then
            echo "::error::Forms with :rules decreased from $BASELINE to $RULES_COUNT (only increase allowed). Use rules from utils/formRules.ts"
            exit 1
          fi
        working-directory: audit-platform/frontend
      - name: V3 console.log strict guard (Req 12.4)
        # V3 Req 12.4：禁止裸 console.log/info/debug（warn/error 已在 ESLint allow 列表）
        # 治理基线 = 0 真实违规（已用 logger.log + DEV 守卫 + eslint-disable 处理）
        # ESLint 默认配置已含此规则；这里加 strict 模式独立卡点防退化
        run: |
          npx eslint --quiet --format compact --rule '{"no-console": "error"}' src/ 2>&1 | tee /tmp/eslint-noconsole.log
          VIOLATIONS=$(grep -c "no-console" /tmp/eslint-noconsole.log || true)
          echo "Strict no-console violations: $VIOLATIONS (baseline: 0)"
          if [ "$VIOLATIONS" -gt "0" ]; then
            echo "::error::Strict no-console violations introduced. Use @/utils/logger.ts (logger.log auto-DEV-guarded) or // eslint-disable-next-line"
            exit 1
          fi
        working-directory: audit-platform/frontend
      - name: V3 编辑器瘦身文件行数防膨胀 guard (workpaper-editor-shrink-phase2)
        # WorkpaperEditor 瘦身后 6 文件 only-decrease 防退化
        # Shell ≤1000 / UniverEditorCore ≤800 / CycleDialogHost ≤200
        # CycleTriggerPanel ≤150 / EditorBanners ≤200 / EditorStatusBar ≤120
        run: |
          declare -A BASELINES=(
            ["src/views/WorkpaperEditor.vue"]=1000
            ["src/views/workpaper-editor/UniverEditorCore.vue"]=800
            ["src/views/workpaper-editor/CycleDialogHost.vue"]=200
            ["src/views/workpaper-editor/CycleTriggerPanel.vue"]=150
            ["src/views/workpaper-editor/EditorBanners.vue"]=200
            ["src/views/workpaper-editor/EditorStatusBar.vue"]=120
          )
          fail=0
          for FILE in "${!BASELINES[@]}"; do
            if [ ! -f "$FILE" ]; then
              echo "::error::$FILE 不存在 — 编辑器瘦身文件丢失"
              fail=1
              continue
            fi
            LINES=$(wc -l < "$FILE")
            BASE=${BASELINES[$FILE]}
            echo "$FILE: $LINES lines (baseline: $BASE)"
            if [ "$LINES" -gt "$BASE" ]; then
              echo "::error::$FILE grew from $BASE to $LINES lines"
              fail=1
            fi
          done
          [ "$fail" -eq 0 ] || exit 1
        working-directory: audit-platform/frontend
      - name: V3 大型 SFC 行数防膨胀 guard (workpaper-list-shrink 2026-05-28)
        # 底稿模块 god component 拆分后 6 文件 only-decrease 防退化
        run: |
          declare -A BASELINES=(
            ["src/views/WorkpaperList.vue"]=1000
            ["src/views/workpaper-list/WorkpaperWorkbenchView.vue"]=700
            ["src/views/workpaper-list/WorkpaperBoardView.vue"]=700
            ["src/views/workpaper-list/WorkpaperLifecycleView.vue"]=700
            ["src/views/workpaper-list/WorkpaperDependencyGraph.vue"]=700
            ["src/views/workpaper-list/WorkpaperDelegationMatrix.vue"]=700
            ["src/components/workpaper/GtCNoteTable.vue"]=1608
            ["src/components/workpaper/GtEControlTest.vue"]=1125
          )
          fail=0
          for FILE in "${!BASELINES[@]}"; do
            if [ ! -f "$FILE" ]; then
              echo "::error::$FILE 不存在 — god component 拆分文件丢失"
              fail=1
              continue
            fi
            LINES=$(wc -l < "$FILE")
            BASE=${BASELINES[$FILE]}
            echo "$FILE: $LINES lines (baseline: $BASE)"
            if [ "$LINES" -gt "$BASE" ]; then
              echo "::error::$FILE grew from $BASE to $LINES lines"
              fail=1
            fi
          done
          [ "$fail" -eq 0 ] || exit 1
        working-directory: audit-platform/frontend
      - name: V3 简单循环编辑器去重 guard (cycle-editor-generic 2026-05-28)
        # K/L/M/N 4 个简单 CycleEditor 已退化为薄包装委托 useSimpleCycleEditor
        # 卡点：4 文件总行数 ≤ 130 行（防有人复制粘贴回特化实现）
        run: |
          TOTAL=0
          for FILE in src/composables/useKCycleEditor.ts src/composables/useLCycleEditor.ts src/composables/useMCycleEditor.ts src/composables/useNCycleEditor.ts; do
            LINES=$(wc -l < "$FILE")
            TOTAL=$((TOTAL + LINES))
          done
          BASELINE=130
          echo "K/L/M/N CycleEditor total: $TOTAL lines (baseline: $BASELINE)"
          if [ "$TOTAL" -gt "$BASELINE" ]; then
            echo "::error::Simple cycle editors grew from $BASELINE to $TOTAL. Use useSimpleCycleEditor generic instead."
            exit 1
          fi
        working-directory: audit-platform/frontend
      - name: Display token guard (R10 Spec B / F10)
        # baseline 来自 .github/workflows/baselines.json，由 Sprint 0 实测填入
        # 4 道 grep 卡点：font-size / color / background / 裸 el-table
        # R10 二轮复盘 S6：字段命名统一为 {property}-prop-{format}-vue-files；旧字段保留为 deprecated alias
        run: |
          if [ ! -f "../../.github/workflows/baselines.json" ]; then
            echo "::warning::baselines.json missing, skipping display token guard"
            exit 0
          fi
          # 读取新字段；缺失则回退到 _deprecated_aliases；都缺则失败
          read_baseline() {
            local key=$1
            local v=$(jq -r --arg k "$key" '. | .[$k] // ._deprecated_aliases[$k] // empty' ../../.github/workflows/baselines.json)
            echo "$v"
          }
          # font-size:Npx baseline（Sprint 1 末尾应达到 0）
          FONT_BASELINE=$(read_baseline "font-size-prop-px-vue-files")
          [ -z "$FONT_BASELINE" ] && FONT_BASELINE=$(read_baseline "font-size-px-vue-files")
          FONT_COUNT=$(grep -rE "font-size:\s*[0-9]+px" src --include="*.vue" | wc -l)
          echo "font-size:Npx in Vue files: $FONT_COUNT (baseline: $FONT_BASELINE)"
          if [ "$FONT_COUNT" -gt "$FONT_BASELINE" ]; then
            echo "::error::Inline font-size hardcode increased from $FONT_BASELINE to $FONT_COUNT. Use var(--gt-font-size-*) instead."
            exit 1
          fi
          # color:#xxx baseline（Sprint 2 末尾目标 < 50）
          COLOR_BASELINE=$(read_baseline "color-prop-hex-vue-files")
          [ -z "$COLOR_BASELINE" ] && COLOR_BASELINE=$(read_baseline "color-hex-vue-files")
          COLOR_COUNT=$(grep -rE "color:\s*#[0-9a-fA-F]{3,6}" src --include="*.vue" | wc -l)
          echo "color:#xxx in Vue files: $COLOR_COUNT (baseline: $COLOR_BASELINE)"
          if [ "$COLOR_COUNT" -gt "$COLOR_BASELINE" ]; then
            echo "::error::Inline hex color increased from $COLOR_BASELINE to $COLOR_COUNT. Use var(--gt-color-*) instead."
            exit 1
          fi
          # background:#xxx baseline（Sprint 2 末尾目标 < 30）
          BG_BASELINE=$(read_baseline "background-prop-hex-vue-files")
          [ -z "$BG_BASELINE" ] && BG_BASELINE=$(read_baseline "background-hex-vue-files")
          BG_COUNT=$(grep -rE "background(-color)?:\s*#[0-9a-fA-F]{3,6}" src --include="*.vue" | wc -l)
          echo "background:#xxx in Vue files: $BG_COUNT (baseline: $BG_BASELINE)"
          if [ "$BG_COUNT" -gt "$BG_BASELINE" ]; then
            echo "::error::Inline hex background increased from $BG_BASELINE to $BG_COUNT. Use var(--gt-bg-*) instead."
            exit 1
          fi
          # border-*-color:#xxx + border shorthand baseline（R10 复盘 G1：419 处全部清零，应保持 0）
          BORDER_BASELINE=$(read_baseline "border-color-prop-hex-vue-files")
          BORDER_COUNT=$(grep -rE "(border(-(top|right|bottom|left))?(-color)?:\s*([0-9]+(\.[0-9]+)?px\s+(solid|dashed|dotted|double)\s+)?|--el-table-(border|row-hover-bg)-color:\s*)#[0-9a-fA-F]{3,6}" src --include="*.vue" | wc -l)
          echo "border hex (incl shorthand) in Vue files: $BORDER_COUNT (baseline: $BORDER_BASELINE)"
          if [ "$BORDER_COUNT" -gt "$BORDER_BASELINE" ]; then
            echo "::error::Inline border hex increased from $BORDER_BASELINE to $BORDER_COUNT. Use var(--gt-color-border-*) instead."
            exit 1
          fi
          # 裸 <el-table 用量 baseline（Sprint 0 实测填入，新表必须用 GtTableExtended/GtFormTable）
          ELTABLE_BASELINE=$(jq -r '."el-table-naked-vue-files"' ../../.github/workflows/baselines.json)
          ELTABLE_COUNT=$(grep -rE "<el-table" src --include="*.vue" | wc -l)
          echo "Naked <el-table in Vue files: $ELTABLE_COUNT (baseline: $ELTABLE_BASELINE)"
          if [ "$ELTABLE_COUNT" -gt "$ELTABLE_BASELINE" ]; then
            echo "::error::Naked <el-table increased from $ELTABLE_BASELINE to $ELTABLE_COUNT. Use GtTableExtended for display tables, GtFormTable for editable tables."
            exit 1
          fi
        working-directory: audit-platform/frontend

      - name: stylelint (R10 Spec B / F2)
        # Sprint 0/1 中: warning 级别（不阻断）；Sprint 1 末尾 font-size 转 error
        # Sprint 2 末尾 color/background 转 error
        # 通过 npm run stylelint 执行（如脚本不存在则跳过）
        run: |
          if [ -f "package.json" ] && grep -q '"stylelint"' package.json; then
            npm run stylelint || echo "::warning::stylelint reported issues (warning level)"
          else
            echo "::warning::stylelint not configured yet, skipping"
          fi
        working-directory: audit-platform/frontend

      - name: Doc backlink guard (R10 二轮复盘 S8)
        # 每个 docs/*_GUIDE.md 必须在源码（前端 vue/ts + 后端 py）至少有 1 处 @docs 反向引用
        # 规则：grep "@docs ../docs/{filename}" 或 "@docs docs/{filename}" 跨 src + backend
        run: |
          fail=0
          for guide in ../../docs/*_GUIDE.md; do
            [ -f "$guide" ] || continue
            fname=$(basename "$guide")
            # 反向引用必须在 frontend/src 或 backend/app 出现 ≥ 1 次
            count=$(
              { grep -rE "@docs[[:space:]]+.*${fname}" src --include="*.vue" --include="*.ts" 2>/dev/null;
                grep -rE "@docs[[:space:]]+.*${fname}" ../../backend/app --include="*.py" 2>/dev/null; } | wc -l
            )
            echo "${fname}: ${count} backlinks"
            if [ "$count" -eq 0 ]; then
              echo "::error::Doc ${fname} has no @docs backlink in source code. Add @docs reference at top of related component/service."
              fail=1
            fi
          done
          [ "$fail" -eq 0 ] || exit 1
        working-directory: audit-platform/frontend

      - name: Build
        run: npm run build
        working-directory: audit-platform/frontend
