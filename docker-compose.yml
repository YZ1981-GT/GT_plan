# ============================================================

# 瀹¤浣滀笟骞冲彴 鈥?Docker Compose 寮€鍙戠幆澧?

# 鍚姩椤哄簭锛歅ostgreSQL 鈫?Redis 鈫?Backend 鈫?ONLYOFFICE

# ============================================================



services:

  # ----------------------------------------------------------

  # PostgreSQL 16

  # ----------------------------------------------------------

  postgres:

    image: postgres:16-alpine

    container_name: audit-postgres

    restart: unless-stopped

    ports:

      - "${PG_PORT:-5432}:5432"

    environment:

      POSTGRES_USER: ${PG_USER:-postgres}

      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}

      POSTGRES_DB: ${PG_DB:-audit_platform}

    volumes:

      - pg_data:/var/lib/postgresql/data

    healthcheck:

      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres}"]

      interval: 5s

      timeout: 5s

      retries: 5

      start_period: 10s

  # ----------------------------------------------------------
  # PgBouncer — transaction pooling (pg-pooling-and-load-test spec)
  # ----------------------------------------------------------
  pgbouncer:
    image: edoburu/pgbouncer:1.22.1-p0
    container_name: audit-pgbouncer
    restart: unless-stopped
    ports:
      - "${PGBOUNCER_PORT:-6432}:5432"
    environment:
      DATABASE_URL: postgres://${PG_USER:-postgres}:${PG_PASSWORD:-postgres}@postgres:5432/${PG_DB:-audit_platform}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 10000
      DEFAULT_POOL_SIZE: 50
      RESERVE_POOL_SIZE: 10
      IGNORE_STARTUP_PARAMETERS: extra_float_digits
    depends_on:
      postgres:
        condition: service_healthy

  # ----------------------------------------------------------

  # Redis 7 — Master

  # ----------------------------------------------------------

  redis:

    image: redis:7-alpine

    container_name: audit-redis

    restart: unless-stopped

    ports:

      - "${REDIS_PORT:-6379}:6379"

    volumes:

      - redis_data:/data

    healthcheck:

      test: ["CMD", "redis-cli", "ping"]

      interval: 5s

      timeout: 5s

      retries: 5

      start_period: 5s



  # ----------------------------------------------------------

  # Redis Replica 1

  # ----------------------------------------------------------

  redis-replica-1:

    image: redis:7-alpine

    container_name: audit-redis-replica-1

    restart: unless-stopped

    command: redis-server --replicaof redis 6379

    ports:

      - "6380:6379"

    depends_on:

      redis:

        condition: service_healthy

    healthcheck:

      test: ["CMD", "redis-cli", "ping"]

      interval: 5s

      timeout: 5s

      retries: 5

      start_period: 5s

    profiles:

      - redis-ha



  # ----------------------------------------------------------

  # Redis Replica 2

  # ----------------------------------------------------------

  redis-replica-2:

    image: redis:7-alpine

    container_name: audit-redis-replica-2

    restart: unless-stopped

    command: redis-server --replicaof redis 6379

    ports:

      - "6381:6379"

    depends_on:

      redis:

        condition: service_healthy

    healthcheck:

      test: ["CMD", "redis-cli", "ping"]

      interval: 5s

      timeout: 5s

      retries: 5

      start_period: 5s

    profiles:

      - redis-ha



  # ----------------------------------------------------------

  # Redis Sentinel 1

  # ----------------------------------------------------------

  sentinel-1:

    image: redis:7-alpine

    container_name: audit-sentinel-1

    restart: unless-stopped

    command: redis-sentinel /etc/sentinel.conf

    ports:

      - "26379:26379"

    volumes:

      - ./docker/sentinel.conf:/etc/sentinel.conf

    depends_on:

      redis:

        condition: service_healthy

    healthcheck:

      test: ["CMD", "redis-cli", "-p", "26379", "ping"]

      interval: 5s

      timeout: 5s

      retries: 5

      start_period: 10s

    profiles:

      - redis-ha



  # ----------------------------------------------------------

  # Redis Sentinel 2

  # ----------------------------------------------------------

  sentinel-2:

    image: redis:7-alpine

    container_name: audit-sentinel-2

    restart: unless-stopped

    command: redis-sentinel /etc/sentinel.conf

    ports:

      - "26380:26379"

    volumes:

      - ./docker/sentinel.conf:/etc/sentinel.conf

    depends_on:

      redis:

        condition: service_healthy

    healthcheck:

      test: ["CMD", "redis-cli", "-p", "26379", "ping"]

      interval: 5s

      timeout: 5s

      retries: 5

      start_period: 10s

    profiles:

      - redis-ha



  # ----------------------------------------------------------

  # Redis Sentinel 3

  # ----------------------------------------------------------

  sentinel-3:

    image: redis:7-alpine

    container_name: audit-sentinel-3

    restart: unless-stopped

    command: redis-sentinel /etc/sentinel.conf

    ports:

      - "26381:26379"

    volumes:

      - ./docker/sentinel.conf:/etc/sentinel.conf

    depends_on:

      redis:

        condition: service_healthy

    healthcheck:

      test: ["CMD", "redis-cli", "-p", "26379", "ping"]

      interval: 5s

      timeout: 5s

      retries: 5

      start_period: 10s

    profiles:

      - redis-ha



  # ----------------------------------------------------------

  # FastAPI Backend（已停用）
  #
  # 本地开发统一用 start-dev.bat 在宿主机 9980 端口运行后端，
  # Docker 里不再启动该服务，避免重复进程 / 端口冲突 / worker 死循环吃 CPU。
  #
  # 如果未来需要在容器里跑后端（例如生产部署），用 profile 手动拉起：
  #   docker compose --profile docker-backend up -d backend
  #
  # ----------------------------------------------------------

  backend:

    profiles:
      - docker-backend

    build:

      context: ./backend

      dockerfile: Dockerfile

      args:

        http_proxy: ""

        https_proxy: ""

        HTTP_PROXY: ""

        HTTPS_PROXY: ""

    container_name: audit-backend

    restart: unless-stopped

    ports:

      - "${API_PORT:-8000}:8000"

    environment:

      DATABASE_URL: postgresql+asyncpg://${PG_USER:-postgres}:${PG_PASSWORD:-postgres}@postgres:5432/${PG_DB:-audit_platform}

      REDIS_URL: redis://redis:6379/0

      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}

      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}

      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-120}

      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}

      CORS_ORIGINS: http://localhost:5173,http://localhost:3030

      ONLYOFFICE_URL: ${ONLYOFFICE_URL:-http://onlyoffice:80}

      WOPI_BASE_URL: ${WOPI_BASE_URL:-http://backend:8000/wopi}

      STORAGE_ROOT: ${STORAGE_ROOT:-./storage}

      ATTACHMENT_PRIMARY_STORAGE: ${ATTACHMENT_PRIMARY_STORAGE:-paperless}

      ATTACHMENT_FALLBACK_TO_LOCAL: ${ATTACHMENT_FALLBACK_TO_LOCAL:-true}

      ATTACHMENT_LOCAL_STORAGE_ROOT: ${ATTACHMENT_LOCAL_STORAGE_ROOT:-./storage/attachments}

      PAPERLESS_URL: ${PAPERLESS_URL:-http://localhost:8010}

      PAPERLESS_TOKEN: ${PAPERLESS_TOKEN:-}

      PAPERLESS_TIMEOUT: ${PAPERLESS_TIMEOUT:-30}

      MINERU_ENABLED: ${MINERU_ENABLED:-true}

      MINERU_API_URL: ${MINERU_API_URL:-http://host.docker.internal:8002}

      MINERU_USE_CLI: ${MINERU_USE_CLI:-false}

      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-true}

      OLLAMA_API_URL: ${OLLAMA_API_URL:-http://host.docker.internal:11434}

      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:8b}

    volumes:

      - ./storage:/app/storage
      - ./backend/app:/app/app

    depends_on:

      postgres:

        condition: service_healthy

      redis:

        condition: service_healthy

    healthcheck:

      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]

      interval: 10s

      timeout: 5s

      retries: 5

      start_period: 30s



  # ----------------------------------------------------------

  # ONLYOFFICE Document Server（开源 Community 版，GitHub 最新 v9.4.0）
  # 镜像：onlyoffice/documentserver:latest ← ONLYOFFICE/Docker-DocumentServer
  # 源码：https://github.com/ONLYOFFICE/DocumentServer （AGPL-3.0）
  # 底稿主编辑已迁移至 Univer；本服务保留 WOPI/附件 Office 预览兼容

  # ----------------------------------------------------------

  # Univer Server（xlsx 完整导入导出 + 协作 + 打印）
  # 部署方式：官方安装脚本（需要 Univer 账号授权）
  #   bash -c "$(curl -fsSL https://get.univer.ai)"
  # 安装后服务默认监听 3010 端口
  # 文档：https://docs.univer.ai/guides/pro/server
  # 注意：Univer Server 是商业产品，免费版有功能限制
  # 前端代码已配置好 Advanced Preset，服务就绪后自动走原生 xlsx 导入路径
  #
  # 如果已通过官方脚本安装，无需在此 compose 文件中配置
  # univer-server 会独立运行在 univer-server/ 目录中

  onlyoffice:

    image: onlyoffice/documentserver:latest

    container_name: audit-onlyoffice

    restart: unless-stopped

    ports:

      - "${OFFICE_PORT:-8080}:80"

    environment:
      - WOPI_ENABLED=true
      - JWT_ENABLED=false

    volumes:

      - office_data:/var/lib/onlyoffice
      - office_logs:/var/log/onlyoffice
      - office_data_certs:/var/www/onlyoffice/Data

    depends_on:

      postgres:

        condition: service_healthy

    healthcheck:

      test: ["CMD-SHELL", "curl -f http://localhost/healthcheck || exit 1"]

      interval: 30s

      timeout: 10s

      retries: 5

      start_period: 120s

    profiles:
      - onlyoffice



  # ----------------------------------------------------------

  # Metabase - 数据可视化看板

  # ----------------------------------------------------------

  metabase:

    image: metabase/metabase:latest

    container_name: audit-metabase

    restart: unless-stopped

    ports:

      - "${METABASE_PORT:-3000}:3000"

    environment:

      MB_DB_TYPE: postgres

      MB_DB_DBNAME: ${PG_DB:-audit_platform}

      MB_DB_PORT: 5432

      MB_DB_USER: ${PG_USER:-postgres}

      MB_DB_PASS: ${PG_PASSWORD:-postgres}

      MB_DB_HOST: postgres

      MB_EMBEDDING_SECRET_KEY: ${METABASE_EMBEDDING_SECRET:-audit-metabase-secret-key}

      JAVA_TIMEZONE: Asia/Shanghai

    volumes:

      - metabase_data:/metabase-data

    depends_on:

      postgres:

        condition: service_healthy

    healthcheck:

      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]

      interval: 15s

      timeout: 10s

      retries: 5

      start_period: 90s



  # ----------------------------------------------------------

  # Paperless-ngx - 附件文档管理 + OCR

  # ----------------------------------------------------------

  paperless:

    image: ghcr.io/paperless-ngx/paperless-ngx:latest

    container_name: audit-paperless

    restart: unless-stopped

    ports:

      - "${PAPERLESS_PORT:-8010}:8000"

    environment:

      PAPERLESS_DBHOST: postgres

      PAPERLESS_DBPORT: 5432

      PAPERLESS_DBNAME: ${PAPERLESS_DB:-paperless}

      PAPERLESS_DBUSER: ${PG_USER:-postgres}

      PAPERLESS_DBPASS: ${PG_PASSWORD:-postgres}

      PAPERLESS_REDIS: redis://redis:6379/1

      PAPERLESS_OCR_LANGUAGE: chi_sim+eng

      PAPERLESS_SECRET_KEY: ${PAPERLESS_SECRET:-audit-paperless-secret-key}

      PAPERLESS_ADMIN_USER: ${PAPERLESS_ADMIN_USER:-admin}

      PAPERLESS_ADMIN_PASSWORD: ${PAPERLESS_ADMIN_PASSWORD:-admin}

      PAPERLESS_URL: http://localhost:${PAPERLESS_PORT:-8010}

    volumes:

      - paperless_data:/usr/src/paperless/data

      - paperless_media:/usr/src/paperless/media

      - ./storage/consume:/usr/src/paperless/consume

    depends_on:

      postgres:

        condition: service_healthy

      redis:

        condition: service_healthy

    healthcheck:

      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/ || exit 1"]

      interval: 15s

      timeout: 10s

      retries: 5

      start_period: 60s



  # ----------------------------------------------------------

  # vLLM 鈥?Qwen3.5-27B-NVFP4 鏈湴澶фā鍨嬫帹鐞嗭紙GPU锛?

  # 妯″瀷缂撳瓨锛欴:\vllm\hf-cache锛堝凡涓嬭浇锛?

  # 鍚姩锛歞ocker compose --profile gpu up vllm

  # API锛歨ttp://localhost:8100/v1锛圤penAI 鍏煎锛?

  # ----------------------------------------------------------

  vllm:

    image: vllm/vllm-openai:cu130-nightly

    container_name: audit-vllm

    restart: unless-stopped

    ports:

      - "${VLLM_PORT:-8100}:8000"

    ipc: host

    runtime: nvidia

    deploy:

      resources:

        reservations:

          devices:

            - driver: nvidia

              count: all

              capabilities: [gpu]

    volumes:

      - ${VLLM_HF_CACHE:-D:/vllm/hf-cache}:/root/.cache/huggingface

    environment:

      - HF_TOKEN=${HF_TOKEN:-}

      - VLLM_NVFP4_GEMM_BACKEND=${NVFP4_BACKEND:-marlin}

      - HF_HUB_OFFLINE=1

      - TRANSFORMERS_OFFLINE=1

    entrypoint: ["/bin/bash", "-c"]

    command:

      - "vllm serve Kbenkhaled/Qwen3.5-27B-NVFP4 --host=0.0.0.0 --port=8000 --max-model-len=32768 --gpu-memory-utilization=0.93 --max-num-seqs=4 --max-num-batched-tokens=32768 --kv-cache-dtype=fp8 --reasoning-parser=qwen3 --enable-auto-tool-choice --enable-prefix-caching --tool-call-parser=qwen3_coder --language-model-only"

    profiles:

      - gpu

    healthcheck:

      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]

      interval: 30s

      timeout: 10s

      retries: 5

      start_period: 120s



  # ----------------------------------------------------------

  # vLLM Embedding — BAAI/bge-m3 (中文多语言 embedding)

  # 独立容器，与 chat 模型共享 GPU（各自限制显存）

  # API：http://localhost:8101/v1 (OpenAI 兼容 /embeddings)

  # ----------------------------------------------------------

  vllm-embed:

    image: vllm/vllm-openai:cu130-nightly

    container_name: audit-vllm-embed

    restart: "no"

    ports:

      - "${VLLM_EMBED_PORT:-8101}:8000"

    ipc: host

    runtime: nvidia

    deploy:

      resources:

        reservations:

          devices:

            - driver: nvidia

              count: all

              capabilities: [gpu]

    volumes:

      - ${VLLM_HF_CACHE:-D:/vllm/hf-cache}:/root/.cache/huggingface

    environment:

      - HF_HUB_OFFLINE=0

      - TRANSFORMERS_OFFLINE=0

      - HTTP_PROXY=http://host.docker.internal:7897

      - HTTPS_PROXY=http://host.docker.internal:7897

      - http_proxy=http://host.docker.internal:7897

      - https_proxy=http://host.docker.internal:7897

      - NO_PROXY=localhost,127.0.0.1

      - no_proxy=localhost,127.0.0.1

    extra_hosts:

      - "host.docker.internal:host-gateway"

    entrypoint: ["/bin/bash", "-c"]

    command:

      - "vllm serve BAAI/bge-m3 --host=0.0.0.0 --port=8000 --runner=pooling --convert=embed --max-model-len=8192 --gpu-memory-utilization=0.12 --dtype=float16 --enforce-eager"

    profiles:

      - gpu

    healthcheck:

      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]

      interval: 30s

      timeout: 10s

      retries: 5

      start_period: 60s



  # ----------------------------------------------------------

  # MinerU 鈥?GPU 鍔犻€?PDF 瑙ｆ瀽锛圤CR + 琛ㄦ牸 + 鍏紡璇嗗埆锛?

  # 鍚姩锛歞ocker compose --profile gpu up mineru

  # API锛歨ttp://localhost:8002锛圡inerU Router锛?

  # WebUI锛歨ttp://localhost:7860锛圙radio锛?

  # ----------------------------------------------------------

  mineru:

    image: mineru:latest

    container_name: audit-mineru

    restart: unless-stopped

    runtime: nvidia

    environment:

      - NVIDIA_VISIBLE_DEVICES=all

    ports:

      - "${MINERU_ROUTER_PORT:-8002}:8002"

      - "${MINERU_WEBUI_PORT:-7860}:7860"

    volumes:

      - ./storage/mineru:/app/output

      - ./storage/attachments:/app/input

    shm_size: 32g

    ipc: host

    profiles:

      - gpu

    healthcheck:

      test: ["CMD-SHELL", "curl -f http://localhost:8002/health || exit 1"]

      interval: 30s

      timeout: 10s

      retries: 3

      start_period: 60s



  # ----------------------------------------------------------

  # Ollama - 本地LLM模型服务

  # 启动：docker compose up ollama

  # API：http://localhost:11434

  # 模型：ollama pull qwen2.5:7b / ollama pull llama3.1:8b

  # ----------------------------------------------------------

  ollama:

    image: ollama/ollama:latest

    container_name: audit-ollama

    restart: unless-stopped

    runtime: nvidia

    environment:

      - NVIDIA_VISIBLE_DEVICES=all

      - OLLAMA_HOST=0.0.0.0

    ports:

      - "${OLLAMA_PORT:-11434}:11434"

    volumes:

      - ollama_data:/root/.ollama

    healthcheck:

      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]

      interval: 30s

      timeout: 10s

      retries: 3

      start_period: 30s



# ----------------------------------------------------------

# 命名卷

# ----------------------------------------------------------

volumes:

  pg_data:

  redis_data:

  office_data:

  office_logs:

  office_data_certs:

  metabase_data:

  paperless_data:

  paperless_media:

  ollama_data:





