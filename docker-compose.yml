# ============================================================
# 审计作业平台 — Docker Compose 开发环境
# 启动顺序：PostgreSQL → Redis → Ollama/ChromaDB → Backend → ONLYOFFICE
# ============================================================

services:
  # ----------------------------------------------------------
  # PostgreSQL 16
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: audit-postgres
    restart: unless-stopped
    ports:
      - "${PG_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
      POSTGRES_DB: ${PG_DB:-audit_platform}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ----------------------------------------------------------
  # Redis 7
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: audit-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ----------------------------------------------------------
  # Ollama 本地LLM推理引擎
  # ----------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: audit-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU透传（可选，注释掉以支持CPU模式）
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ----------------------------------------------------------
  # ChromaDB 向量数据库
  # ----------------------------------------------------------
  chromadb:
    image: chromadb/chroma:latest
    container_name: audit-chromadb
    restart: unless-stopped
    ports:
      - "${CHROMADB_PORT:-8000}:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ----------------------------------------------------------
  # FastAPI Backend（本地构建）
  # ----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: audit-backend
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${PG_USER:-postgres}:${PG_PASSWORD:-postgres}@postgres:5432/${PG_DB:-audit_platform}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-120}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      ONLYOFFICE_URL: ${ONLYOFFICE_URL:-http://onlyoffice:80}
      WOPI_BASE_URL: ${WOPI_BASE_URL:-http://backend:8000/wopi}
      STORAGE_ROOT: ${STORAGE_ROOT:-./storage}
      # AI 服务配置
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      CHROMADB_URL: ${CHROMADB_URL:-http://chromadb:8000}
      PADDLEOCR_ENABLED: ${PADDLEOCR_ENABLED:-true}
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------
  # ONLYOFFICE Document Server 8.2
  # ----------------------------------------------------------
  onlyoffice:
    image: onlyoffice/documentserver:8.2
    container_name: audit-onlyoffice
    restart: unless-stopped
    ports:
      - "${OFFICE_PORT:-8080}:80"
    volumes:
      - office_data:/var/lib/onlyoffice
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/healthcheck || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

# ----------------------------------------------------------
# 命名卷
# ----------------------------------------------------------
volumes:
  pg_data:
  redis_data:
  ollama_data:
  chromadb_data:
  office_data:
