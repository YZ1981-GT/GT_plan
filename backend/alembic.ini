# Alembic 配置文件

[alembic]
# 迁移脚本目录
script_location = alembic

# 留空，由 env.py 从 Settings 动态读取
sqlalchemy.url =

# 迁移文件命名模板
file_template = %%(rev)s_%%(slug)s

# 时区
timezone = UTC

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
