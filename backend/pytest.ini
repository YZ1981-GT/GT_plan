[pytest]
asyncio_mode = auto
testpaths = tests
markers =
    e2e: end-to-end integration tests (require PostgreSQL + Redis)
    slow: marks tests as slow (deselect with '-m "not slow"')
    pg_only: marks tests that require PostgreSQL (skip on SQLite)
filterwarnings =
    ignore::DeprecationWarning:sqlalchemy.sql.schema
